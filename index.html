<style>

function attachMoneyInput(el){
  if(!el) return;
  el.addEventListener('input', ()=>{
    const cursorPos = el.selectionStart;
    const digitsBeforeCursor = el.value.slice(0, cursorPos).replace(/[^0-9]/g,'').length;
    const raw = el.value.replace(/[^0-9]/g,'');
    el.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
    let pos = 0, digitCount = 0;
    while(pos < el.value.length && digitCount < digitsBeforeCursor){ if(/[0-9]/.test(el.value[pos])) digitCount++; pos++; }
    el.setSelectionRange(pos, pos);
  });
}

/* ---- safe merge for concurrently-edited id-keyed lists (transactions, savings, loans, stocks, recurring) ---- */
function mergeById(local, remote){
  const map = new Map();
  (remote||[]).forEach(item=>map.set(item.id, item));
  (local||[]).forEach(item=>{
    const ex = map.get(item.id);
    if(!ex || (item.updatedAt||0) >= (ex.updatedAt||0)) map.set(item.id, item);
  });
  return Array.from(map.values());
}
async function persistMerged(key, localArr){
  let remote = [];
  try{ const r = await window.storage.get(key, true); remote = r ? JSON.parse(r.value) : []; } catch(e){ remote = []; }
  const merged = mergeById(localArr, remote);
  await persist(key, merged);
  return merged;
}

function txInMonth(d){ const key = monthKey(d); return activeTx().filter(t => t.date.slice(0,7) === key); }
function monthSummary(){
  const list = txInMonth(currentMonthDate());
  let income=0, expense=0;
  list.forEach(t => t.type==='income' ? income+=t.amount : expense+=t.amount);
  return {income, expense, balance: income-expense, list};
}
function groupByDate(list){
  const groups = {};
  list.slice().sort((a,b)=> b.date.localeCompare(a.date) || b.createdAt-a.createdAt).forEach(t=>{ if(!groups[t.date]) groups[t.date]=[]; groups[t.date].push(t); });
  return groups;
}

function adjustForWeekend(y,m,day,daysInMonth){
  const d = new Date(y, m, Math.min(day, daysInMonth));
  const dow = d.getDay();
  if(dow===6) d.setDate(d.getDate()+2);
  else if(dow===0) d.setDate(d.getDate()+1);
  return d;
}
async function materializeRecurring(){
  const rules = activeRecurring();
  if(rules.length===0) return;
  const now = new Date();
  let added = false;
  rules.forEach(rule=>{
    const startDate = rule.createdAt ? new Date(rule.createdAt) : now;
    let cursor = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
    const limit = new Date(now.getFullYear(), now.getMonth(), 1);
    let guard = 0;
    while(cursor <= limit && guard < 24){
      guard++;
      const y=cursor.getFullYear(), m=cursor.getMonth();
      const daysInMonth = new Date(y,m+1,0).getDate();
      const d = adjustForWeekend(y,m,rule.day,daysInMonth);
      const isCurrentMonth = (y===now.getFullYear() && m===now.getMonth());
      const due = isCurrentMonth ? (now >= d) : true;
      if(due){
        const mk = y+'-'+pad(m+1);
        const exists = state.transactions.some(t=>t.recurringId===rule.id && !t.deleted && t.date.slice(0,7)===mk);
        if(!exists){
          const dateStr = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
          state.transactions.push({ id: uid(), type:'expense', amount: rule.amount, category: rule.category,
            paymentMethod: rule.paymentMethod, person: rule.person, date: dateStr,
            memo: '정기결제 · '+rule.name, createdAt: Date.now(), updatedAt: Date.now(), recurringId: rule.id, deleted:false });
          added = true;
        }
      }
      cursor = new Date(y, m+1, 1);
    }
  });
  if(added) await persistTx();
}
async function materializeLoans(){
  const loans = activeLoans().filter(l=>l.startMonth);
  if(loans.length===0) return;
  const now = new Date();
  let added = false;
  loans.forEach(loan=>{
    const [sy, sm] = loan.startMonth.split('-').map(Number);
    const base = Math.floor(loan.totalAmount / loan.months);
    const remainder = loan.totalAmount - base*loan.months;
    for(let i=0; i<loan.months; i++){
      const cursor = new Date(sy, sm-1+i, 1);
      const y=cursor.getFullYear(), m=cursor.getMonth();
      const daysInMonth = new Date(y,m+1,0).getDate();
      const d = adjustForWeekend(y,m,loan.day,daysInMonth);
      if(now < d) continue;
      const exists = state.transactions.some(t=>t.loanId===loan.id && t.installmentIndex===i && !t.deleted);
      if(!exists){
        const dateStr = d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
        const amt = (i===loan.months-1) ? base+remainder : base;
        state.transactions.push({ id: uid(), type:'expense', amount: amt, category: loan.category||'기타',
          paymentMethod: loan.paymentMethod, person: loan.person, date: dateStr,
          memo: `${loan.name} 할부 (${i+1}/${loan.months}회)`, createdAt: Date.now(), updatedAt: Date.now(),
          loanId: loan.id, installmentIndex: i, deleted:false });
        added = true;
      }
    }
  });
  if(added) await persistTx();
}

function buildDonut(list){
  const byCat = {};
  list.forEach(t=>{ byCat[t.category] = (byCat[t.category]||0) + t.amount; });
  const total = Object.values(byCat).reduce((a,b)=>a+b,0);
  const entries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  if(total===0 || entries.length===0) return { gradient: '#ECE3D2', total: 0, rows: [] };
  let acc = 0; const stops = [];
  const rows = entries.map((e,idx)=>{
    const [cat, amt] = e; const pct = amt/total*100;
    const color = MUSTARD_PALETTE[idx % MUSTARD_PALETTE.length];
    const start = acc; acc += pct;
    stops.push(`${color} ${start}% ${acc}%`);
    return { cat, amt, pct, color };
  });
  return { gradient: `conic-gradient(${stops.join(',')})`, total, rows };
}
function buildCalendarWeeks(monthDate){
  const year = monthDate.getFullYear(), month = monthDate.getMonth();
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const offset = (firstDay.getDay()+6)%7;
  const cells = [];
  for(let i=0;i<offset;i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);
  while(cells.length % 7 !== 0) cells.push(null);
  const weeks = [];
  for(let i=0;i<cells.length;i+=7) weeks.push(cells.slice(i,i+7));
  return weeks;
}

function renderModal(){
  if(!state.modal) return '';
  const cfg = getModalConfig(state.modal.kind, state.modal.data);
  let f = `<div class="modal-backdrop" id="modalBackdrop"><div class="modal-sheet">
    <div class="modal-title">${cfg.title}</div>`;
  if(cfg.message) f += `<div class="modal-msg">${cfg.message}</div>`;
  (cfg.fields||[]).forEach(fld=>{
    const val = (state.modalValues && state.modalValues[fld.key]!==undefined) ? state.modalValues[fld.key] : (fld.value!=null?fld.value:'');
    f += `<div class="field"><label>${fld.label}</label>`;
    if(fld.type==='select'){
      const opts = fld.options||[];
      const matchFound = opts.some(o=>o.v===val);
      let optsHtml = (!matchFound && val) ? `<option value="${val}" selected>⚠ 확인 필요 - 다시 선택해주세요</option>` : '';
      optsHtml += opts.map(o=>`<option value="${o.v}" ${matchFound && val===o.v?'selected':''}>${o.l}</option>`).join('');
      f += `<select id="mf-${fld.key}">${optsHtml}</select>`;
    } else if(fld.type==='money'){
      const displayVal = (val===''||val==null) ? '' : fmtInputMoney(parseMoneyInput(val));
      f += `<input type="text" inputmode="numeric" class="money-input" id="mf-${fld.key}" placeholder="${fld.placeholder||''}" value="${displayVal}">`;
    } else {
      const inputType = (fld.type==='number'||fld.type==='decimal') ? 'number' : (fld.type==='date' ? 'date' : (fld.type==='month' ? 'month' : 'text'));
      const inputMode = fld.type==='number' ? 'numeric' : (fld.type==='decimal' ? 'decimal' : '');
      const stepAttr = fld.type==='decimal' ? 'step="0.01"' : '';
      f += `<input type="${inputType}" id="mf-${fld.key}" ${inputMode?`inputmode="${inputMode}"`:''} ${stepAttr} placeholder="${fld.placeholder||''}" value="${val}">`;
    }
    f += `</div>`;
  });
  if(state.modalError) f += `<div class="modal-error">${state.modalError}</div>`;
  f += `<div class="modal-actions">
    <button class="modal-cancel" id="modalCancel">취소</button>
    <button class="modal-submit ${cfg.danger?'danger':''}" id="modalSubmit">${cfg.submitLabel}</button>
  </div></div></div>`;
  return f;
}
function submitModal(){
  const cfg = getModalConfig(state.modal.kind, state.modal.data);
  const vals = {};
  (cfg.fields||[]).forEach(fld=>{ const el = document.getElementById('mf-'+fld.key); vals[fld.key] = el ? el.value : ''; });
  const err = cfg.onSubmit(vals);
  if(err){ state.modalValues = vals; state.modalError = err; render(); return; }
  closeModal();
}

/* ---------- RENDER ---------- */
function render(){
  const app = document.getElementById('app');
  if(!state.ready){ return; }
  const activeId = document.activeElement && document.activeElement.id;
  const selStart = (activeId && document.activeElement.selectionStart!=null) ? document.activeElement.selectionStart : null;

  const md = currentMonthDate();
  const summary = monthSummary();

  let html = '';
  if(state.tab==='add'){ html += renderAddHeader(); }
  else if(state.tab==='list'){ html += `<header class="sub"><button class="back-btn" id="backHome">‹</button><div class="sub-title">전체 내역</div></header>`; }
  else {
    html += `<header class="top"><div class="brand-row"><div class="avatar">🏠</div><div>
      <div class="brand-name">804호 가계부</div>
      <div class="brand-sub">${personLabel('p1')} · ${personLabel('p2')}</div>
    </div></div></header>`;
  }

  html += state.tab==='home' ? `<main class="home-main">` : `<main>`;
  if(state.tab==='home') html += renderHome(summary, md);
  else if(state.tab==='stats') html += renderStats(summary, md);
  else if(state.tab==='assets') html += renderAssets();
  else if(state.tab==='settings') html += renderSettings();
  else if(state.tab==='add') html += renderAdd();
  else if(state.tab==='list') html += renderList(summary);
  html += `</main>`;

  if(['home','stats','assets','settings'].includes(state.tab)){
    html += `<button class="fab" id="fabAdd">+</button>`;
    html += `<nav class="bottom">
      ${navBtn('home','홈','<path d="M4 11.5 12 4l8 7.5V20a1 1 0 0 1-1 1h-4.5v-6h-5v6H5a1 1 0 0 1-1-1V11.5Z"/>')}
      ${navBtn('stats','그래프','<path d="M4 19v-6M10 19V9M16 19v-9"/><path d="M3 19h18"/>')}
      ${navBtn('assets','자산','<circle cx="9" cy="9" r="5"/><circle cx="15" cy="15" r="5"/>')}
      ${navBtn('settings','설정','<path d="M4 6h10M4 18h10"/><circle cx="17" cy="6" r="2.2"/><circle cx="9" cy="18" r="2.2"/><path d="M4 12h16"/>')}
    </nav>`;
  }
  html += renderModal();
  app.innerHTML = html;
  attachEvents();

  if(activeId){
    const el = document.getElementById(activeId);
    if(el){ el.focus(); if(selStart!=null && el.setSelectionRange){ try{ el.setSelectionRange(selStart, selStart); }catch(e){} } }
  }
}
function navBtn(key,label,inner){
  const active = state.tab===key ? 'active' : '';

/* ---------- HOME ---------- */
function renderHome(summary, md){
  const balPos = summary.balance >= 0;
  let h = `<div class="card hero-card-fixed">
    <div class="hero-amount">${balPos?'+':'-'}${fmt(Math.abs(summary.balance))}</div>
    <div class="hero-row">
      <div class="hero-item inc"><span class="lbl">+ 수입</span><span class="val">${fmt(summary.income)}</span></div>
      <div class="hero-item exp"><span class="lbl">- 지출</span><span class="val">${fmt(summary.expense)}</span></div>
      <button class="hero-link" data-tab="list">전체 내역 ›</button>
    </div>
  </div>`;

  const weeks = buildCalendarWeeks(md);
  const todayS = todayStr();
  h += `<div class="card cal-fill">
    <div class="month-switch"><div class="lbl">${md.getFullYear()}년 ${md.getMonth()+1}월</div>
    <div class="arrows"><button id="prevMonth">‹</button><button id="nextMonth">›</button></div></div>
    <div class="cal-head">${WEEKDAYS.map(w=>`<div>${w}</div>`).join('')}</div>
    <div class="cal-grid" style="grid-template-rows:repeat(${weeks.length},1fr);">`;
  weeks.forEach(week=>{ week.forEach(d=>{
    if(d===null){ h += `<div class="cal-cell empty"></div>`; return; }
    const dateStr = md.getFullYear()+'-'+pad(md.getMonth()+1)+'-'+pad(d);
    const dayTx = activeTx().filter(t=>t.date===dateStr);
    const inc = dayTx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp = dayTx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const isToday = dateStr===todayS; const isSel = state.selectedDate===dateStr;
    h += `<button class="cal-cell ${isToday?'today':''} ${isSel?'selected':''}" data-date="${dateStr}">
      <div class="d">${d}</div>
      ${exp?`<div class="cal-amt expense">-${fmtBare(exp)}</div>`:''}
      ${inc?`<div class="cal-amt income">+${fmtBare(inc)}</div>`:''}
    </button>`;
  }); });
  h += `</div></div>`;

  if(state.selectedDate){
    const dayTx = activeTx().filter(t=>t.date===state.selectedDate);
    const [y,m,dd] = state.selectedDate.split('-');
    h += `<div class="card selected-day-fixed"><div class="section-title">${parseInt(m)}월 ${parseInt(dd)}일 내역 <button class="link-btn" data-closeday="1">닫기</button></div>`;
    if(dayTx.length===0){ h += `<div class="empty-msg">이 날짜엔 기록이 없어요.</div>`; }
    else { dayTx.forEach(t=>{ h += txItemHtml(t); }); }
    h += `</div>`;
  }
  return h;
}

  let h = `<div class="card">
    <div class="filter-label">누가</div>
    <div class="filter-row">${personOptions.map(o=>`<button class="chip ${state.statsPersonFilter===o.k?'active':''}" data-statsperson="${o.k}">${o.l}</button>`).join('')}</div>
    <div class="filter-label">어떤 수단으로</div>
    <div class="filter-row">${payOptions.map(o=>`<button class="chip ${state.statsPayFilter===o.k?'active':''}" data-statspay="${o.k}">${o.l}</button>`).join('')}</div>
    <div class="stats-summary"><b>${personLbl}</b>가 <b>${payLbl}</b>으로 쓴 금액</div>
    <div class="stats-amount">${fmt(totalAmt)}</div>`;

  if(donut.rows.length===0){ h += `<div class="empty-msg">해당 조건의 지출 기록이 없어요.</div>`; }
  else {
    h += `<div class="donut-wrap">
      <div class="donut" style="background:${donut.gradient}">
        <div class="donut-center"><div class="t1">카테고리별</div><div class="t2">${fmtShort(donut.total)}</div></div>
      </div>
      <div class="cat-list">
        ${donut.rows.slice(0,4).map(r=>`
          <button type="button" class="cat-row" data-catdrill="${r.cat}"><span class="cat-dot" style="background:${r.color}"></span>
          <div class="cat-row-mid"><div class="cat-row-name">${catIcon(r.cat)} ${r.cat}</div></div>
          <div><div class="cat-row-amt">${fmt(r.amt)}</div><div class="cat-row-pct">${r.pct.toFixed(0)}%</div></div></button>`).join('')}
      </div>
    </div>`;
    if(donut.rows.length>4){
      h += `<div class="cat-full-list">${donut.rows.map(r=>`
        <button type="button" class="cat-row" style="margin-bottom:10px;" data-catdrill="${r.cat}"><span class="cat-dot" style="background:${r.color}"></span>
        <div class="cat-row-mid"><div class="cat-row-name">${catIcon(r.cat)} ${r.cat}</div></div>
        <div><div class="cat-row-amt">${fmt(r.amt)}</div><div class="cat-row-pct">${r.pct.toFixed(0)}%</div></div></button>`).join('')}</div>`;
    }
  }
  h += `</div>`;

  if(state.statsCategoryDrill){
    const drillCat = state.statsCategoryDrill;
    const drillList = list.filter(t=>t.category===drillCat).slice().sort((a,b)=> b.date.localeCompare(a.date) || b.createdAt-a.createdAt);
    const drillTotal = drillList.reduce((s,t)=>s+t.amount,0);
    h += `<div class="card"><div class="section-title">${catIcon(drillCat)} ${drillCat} <button class="link-btn" data-closedrill="1">닫기</button></div>
      <div class="stats-amount" style="font-size:22px;margin-bottom:14px;">${fmt(drillTotal)}</div>`;
    if(drillList.length===0){ h += `<div class="empty-msg">해당 조건에서 이 카테고리 지출이 없어요.</div>`; }
    else { drillList.forEach(t=>{ h += txItemHtml(t); }); }
    h += `</div>`;
  }

  const allExpense = summary.list.filter(t=>t.type==='expense');
  const cardTotals = state.paymentMethods.map(p=>({...p, amt: allExpense.filter(t=>t.paymentMethod===p.id).reduce((s,t)=>s+t.amount,0)})).sort((a,b)=>b.amt-a.amt);
  const cardMax = Math.max(1, ...cardTotals.map(c=>c.amt));
  h += `<div class="card"><div class="section-title">지불수단별 이번 달 사용금액</div>`;
  if(cardTotals.length===0 || cardTotals.every(c=>c.amt===0)){ h += `<div class="empty-msg">이번 달 지불수단별 지출 기록이 없어요.</div>`; }
  else {
    cardTotals.forEach(c=>{
      const pct = Math.round(c.amt/cardMax*100);
      h += `<div class="card-total-row"><div class="tx-icon">${c.i}</div>
        <div class="card-total-mid"><div class="card-total-name">${c.n} <span style="color:var(--ink-soft);font-weight:600;">· ${c.owner==='공용'?'공용':personLabel(c.owner)}</span></div>
        <div class="card-total-bar"><div class="card-total-bar-fill" style="width:${pct}%"></div></div></div>
        <div class="card-total-amt">${fmt(c.amt)}</div></div>`;
    });
  }
  h += `</div>`;

  const trendMonths = [];
  for(let i=5;i>=0;i--){
    const d = new Date(md); d.setMonth(md.getMonth()-i);
    const exp = txInMonth(d).filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    trendMonths.push({label:(d.getMonth()+1)+'월', exp, isCurrent:i===0});
  }
  const trendMax = Math.max(1, ...trendMonths.map(m=>m.exp));
  h += `<div class="card"><div class="section-title">월별 지출 추이 <span class="hint">최근 6개월</span></div>
    <div class="trend-chart">
      ${trendMonths.map(m=>`
        <div class="trend-col">
          <div class="trend-amt">${m.exp>0?fmtShort(m.exp):''}</div>
          <div class="trend-bar-wrap"><div class="trend-bar ${m.isCurrent?'current':''}" style="height:${Math.max(3, m.exp/trendMax*100)}%"></div></div>
          <div class="trend-label ${m.isCurrent?'current':''}">${m.label}</div>
        </div>`).join('')}
    </div>
  </div>`;
  const budgetCats = Object.keys(state.budgets).filter(c=>state.budgets[c]>0);
  if(budgetCats.length>0){
    h += `<div class="card"><div class="section-title">이번 달 예산 <span class="hint">설정 탭에서 변경</span></div>`;
    budgetCats.forEach(cat=>{
      const spent = allExpense.filter(t=>t.category===cat).reduce((s,t)=>s+t.amount,0);
      const budget = state.budgets[cat]; const remain = budget-spent; const over = remain<0;
      const pct = Math.min(100, spent/budget*100);
      h += `<div class="budget-status"><div class="budget-status-top"><span class="name">${catIcon(cat)} ${cat}</span><span>${fmt(spent)} / ${fmt(budget)}</span></div>
        <div class="bar-track"><div class="bar-fill ${over?'over':''}" style="width:${pct}%"></div></div>
        <div class="budget-status-sub ${over?'over':''}">${over?`예산 초과 ${fmt(Math.abs(remain))}`:`남은 예산 ${fmt(remain)}`}</div></div>`;
    });
    h += `</div>`;
  }

  return h;
}

/* ---------- ASSETS ---------- */
function renderAssets(){
  let h = `<div class="card">
    <div class="seg">
      <button class="${state.assetTab==='savings'?'active':''}" data-assettab="savings">적금</button>
      <button class="${state.assetTab==='deposits'?'active':''}" data-assettab="deposits">예금</button>
      <button class="${state.assetTab==='loans'?'active':''}" data-assettab="loans">대출</button>
      <button class="${state.assetTab==='stocks'?'active':''}" data-assettab="stocks">주식</button>
      <button class="${state.assetTab==='accounts'?'active':''}" data-assettab="accounts">통장</button>
    </div>`;
  if(state.assetTab==='savings'){
    const list = activeSavings();
    const total = list.reduce((s,x)=>s+x.amount,0);
    h += `<div class="asset-total">${fmt(total)} <span style="font-size:12px;color:var(--ink-soft);font-weight:600;">월 납입 합계</span></div>`;
    if(list.length===0) h += `<div class="empty-msg">등록된 적금이 없어요.</div>`;
    list.forEach(s=>{
      const maturity = s.maturityDate ? ('만기 '+fmtDate(s.maturityDate)) : (s.term ? ('기간 '+s.term) : '');
      h += `<div class="asset-item"><div class="asset-top">
        <div><div class="asset-name">${s.name}</div>
        <div class="asset-sub">${maturity} · 자동이체일 매월 ${s.day}일${s.rate!=null?' · 연 '+s.rate+'%':''}</div></div>
        <div style="display:flex;align-items:center;gap:8px;"><div class="asset-amt">${fmt(s.amount)}</div>
        <button class="asset-del" data-delsaving="${s.id}">✕</button></div>
      </div></div>`;
    });
    h += `<button class="add-tile-btn" id="addSaving">+ 적금 추가</button>`;
  } else if(state.assetTab==='deposits'){
    const list = activeDeposits();
    const total = list.reduce((s,x)=>s+x.amount,0);
    h += `<div class="asset-total">${fmt(total)} <span style="font-size:12px;color:var(--ink-soft);font-weight:600;">예치금액 합계</span></div>`;
    if(list.length===0) h += `<div class="empty-msg">등록된 예금이 없어요.</div>`;
    list.forEach(s=>{
      h += `<div class="asset-item"><div class="asset-top">
        <div><div class="asset-name">${s.name}</div>
        <div class="asset-sub">만기 ${fmtDate(s.maturityDate)}${s.rate!=null?' · 연 '+s.rate+'%':''}</div></div>
        <div style="display:flex;align-items:center;gap:8px;"><div class="asset-amt">${fmt(s.amount)}</div>
        <button class="asset-del" data-deldeposit="${s.id}">✕</button></div>
      </div></div>`;
    });
    h += `<button class="add-tile-btn" id="addDeposit">+ 예금 추가</button>`;
  } else if(state.assetTab==='loans'){
    const list = activeLoans();
    const total = list.reduce((s,x)=>s+(x.totalAmount!=null?x.totalAmount:x.amount||0),0);
    h += `<div class="asset-total">${fmt(total)} <span style="font-size:12px;color:var(--ink-soft);font-weight:600;">할부 총액 합계</span></div>`;
    if(list.length===0) h += `<div class="empty-msg">등록된 카드할부/대출이 없어요.</div>`;
    list.forEach(l=>{
      if(l.startMonth){
        const totalAmt = l.totalAmount;
        const paidCount = state.transactions.filter(t=>t.loanId===l.id && !t.deleted && t.date<=todayStr()).length;
        h += `<div class="asset-item"><div class="asset-top">
          <div><div class="asset-name">${l.name}</div>
          <div class="asset-sub">${payIcon(l.paymentMethod)} ${payName(l.paymentMethod)} · ${l.months}개월 할부 · ${paidCount}/${l.months}회 진행</div></div>
          <div style="display:flex;align-items:center;gap:8px;"><div class="asset-amt">${fmt(totalAmt)}</div>
          <button class="asset-del" data-delloan="${l.id}">✕</button></div>
        </div>`;
        const schedule = [];
        const [sy, sm] = l.startMonth.split('-').map(Number);
        const base = Math.floor(l.totalAmount / l.months);
        const remainder = l.totalAmount - base*l.months;
        for(let i=0;i<l.months;i++){
          const cursor = new Date(sy, sm-1+i, 1);
          const daysInMonth = new Date(cursor.getFullYear(), cursor.getMonth()+1, 0).getDate();
          const d = adjustForWeekend(cursor.getFullYear(), cursor.getMonth(), l.day, daysInMonth);
          const amt = (i===l.months-1) ? base+remainder : base;
          const done = d <= new Date();
          schedule.push({d, amt, done});
        }
        h += `<div class="purchase-log">${schedule.map(s=>`
          <div class="purchase-row"><div class="purchase-date">${s.d.getMonth()+1}/${s.d.getDate()}</div>
          <div class="purchase-mid">카드대금 청구${s.done?'':' 예정'}</div>
          <div class="purchase-sub-total" style="${s.done?'':'color:var(--tan);'}">${fmt(s.amt)}</div></div>`).join('')}</div>
        </div>`;
      } else {
        h += `<div class="asset-item"><div class="asset-top">
          <div><div class="asset-name">${l.name}</div>
          <div class="asset-sub">${l.card||'-'} · ${l.months}개월 할부</div></div>
          <div style="display:flex;align-items:center;gap:8px;"><div class="asset-amt">${fmt(l.amount||0)}</div>
          <button class="asset-del" data-delloan="${l.id}">✕</button></div>
        </div></div>`;
      }
    });
    h += `<button class="add-tile-btn" id="addLoan">+ 카드할부/대출 추가</button>`;
  } else if(state.assetTab==='stocks'){
    const list = activeStocks();
    const total = list.reduce((s,x)=>s+stockTotalAmount(x),0);
    h += `<div class="asset-total">${fmt(total)} <span style="font-size:12px;color:var(--ink-soft);font-weight:600;">매입금액 합계</span></div>`;
    if(list.length===0) h += `<div class="empty-msg">등록된 주식이 없어요.</div>`;
    list.forEach(s=>{
      const purchases = stockPurchases(s);
      const totalAmt = stockTotalAmount(s);
      const totalShares = stockTotalShares(s);
      const avg = stockAvgPrice(s);
      h += `<div class="asset-item"><div class="asset-top">
        <div><div class="asset-name">${s.name} ${s.owner?`<span class="owner-tag">${s.owner}</span>`:''}</div>
        <div class="asset-sub">평단가 ${fmt(avg)} · 보유 ${totalShares}주</div></div>
        <div style="display:flex;align-items:center;gap:8px;"><div class="asset-amt">${fmt(totalAmt)}</div>
        <button class="asset-del" data-delstock="${s.id}">✕</button></div>
      </div>`;
      if(purchases.length>0){
        h += `<div class="purchase-log">`;
        purchases.slice().reverse().forEach(p=>{
          const d = new Date(p.date);
          h += `<div class="purchase-row"><div class="purchase-date">${d.getMonth()+1}/${d.getDate()}</div>
            <div class="purchase-mid">주당 ${fmt(p.price)} × ${p.shares}주</div>
            <div class="purchase-sub-total">${fmt(p.price*p.shares)}</div>
            <button class="tx-del" data-delpurchase="${s.id}::${p.id}">✕</button></div>`;
        });
        h += `</div>`;
      }
      h += `<button class="add-tile-btn" data-addpurchase="${s.id}" style="margin-top:10px;">+ 매수 추가</button></div>`;
    });
    h += `<button class="add-tile-btn" id="addStock">+ 종목 추가</button>`;
  } else {
    const list = activeAccounts();
    const total = list.reduce((s,a)=>s+accountBalance(a),0);
    h += `<div class="asset-total">${fmt(total)} <span style="font-size:12px;color:var(--ink-soft);font-weight:600;">잔액 합계</span></div>`;
    if(list.length===0) h += `<div class="empty-msg">등록된 통장이 없어요.</div>`;
    list.forEach(a=>{
      const entries = accountEntries(a);
      const bal = accountBalance(a);
      h += `<div class="asset-item"><div class="asset-top">
        <div><div class="asset-name">${a.name}</div>
        <div class="asset-sub">현재 잔액${a.rate!=null?' · 연 '+a.rate+'%':''}</div></div>
        <div style="display:flex;align-items:center;gap:8px;"><div class="asset-amt">${fmt(bal)}</div>
        <button class="asset-del" data-delaccount="${a.id}">✕</button></div>
      </div>`;
      if(entries.length>0){
        h += `<div class="purchase-log">`;
        entries.slice().reverse().forEach(e=>{
          const d = new Date(e.date);
          h += `<div class="purchase-row"><div class="purchase-date">${d.getMonth()+1}/${d.getDate()}</div>
            <div class="purchase-mid">${e.amount>=0?'입금':'출금'}${e.memo?' · '+e.memo:''}</div>
            <div class="purchase-sub-total" style="${e.amount>=0?'color:var(--coral);':'color:var(--indigo);'}">${e.amount>=0?'+':''}${fmt(e.amount)}</div>
            <button class="tx-del" data-delaccountentry="${a.id}::${e.id}">✕</button></div>`;
        });
        h += `</div>`;
      }
      h += `<button class="add-tile-btn" data-addaccountentry="${a.id}" style="margin-top:10px;">+ 입출금 기록</button></div>`;
    });
    h += `<button class="add-tile-btn" id="addAccount">+ 통장 추가</button>`;
  }
  h += `</div>`;
  return h;
}

  </div>`;
  return h;
}

/* ---------- LIST (with search) ---------- */
function renderList(summary){
  const q = (state.searchQuery||'').trim().toLowerCase();
  let source, isSearch = q.length>0;
  if(isSearch){
    source = activeTx().filter(t=>
      (t.memo||'').toLowerCase().includes(q) ||
      (t.category||'').toLowerCase().includes(q) ||
      payName(t.paymentMethod).toLowerCase().includes(q)
    );
  } else {
    source = state.filterPerson==='all' ? summary.list : summary.list.filter(t=>t.person===state.filterPerson);
  }
  const groups = groupByDate(source);
  const dates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  let h = `<div class="search-wrap"><input type="text" id="searchInput" placeholder="메모·카테고리·지불수단 검색 (예: 이마트)" value="${state.searchQuery||''}"></div>`;
  if(!isSearch){
    h += `<div class="filter-row">
      <button class="chip ${state.filterPerson==='all'?'active':''}" data-filter="all">전체</button>
      <button class="chip ${state.filterPerson==='p1'?'active':''}" data-filter="p1">${personLabel('p1')}</button>
      <button class="chip ${state.filterPerson==='p2'?'active':''}" data-filter="p2">${personLabel('p2')}</button>
    </div>`;
  } else {
    h += `<div class="filter-label">전체 기간에서 "${state.searchQuery}" 검색 결과 ${source.length}건</div>`;
  }
  h += `<div class="card">`;
  if(dates.length===0){ h += `<div class="empty-msg">${isSearch?'검색 결과가 없어요.':'이번 달 기록이 없어요.'}</div>`; }
  else {
    dates.forEach(date=>{
      const d = new Date(date);
      h += `<div class="tx-day"><div class="tx-day-label">${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일</div>`;
      groups[date].forEach(t=>{
        h += `<div class="tx-item editable" data-edittx="${t.id}"><div class="tx-icon">${catIcon(t.category)}</div>
          <div class="tx-mid"><div class="tx-cat">${t.category}</div>
          <div class="tx-memo">${personTag(t.person)}<span class="txt">${t.paymentMethod?payIcon(t.paymentMethod)+' '+payName(t.paymentMethod)+' · ':''}${t.memo||''}</span></div></div>
          <div class="tx-right"><div class="tx-amt ${t.type}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div></div>
          <button class="tx-del" data-del="${t.id}">✕</button></div>`;
      });
      h += `</div>`;
    });
  }
  h += `</div>`;
  return h;
}

/* ---------- edit transaction ---------- */
function openEditTx(id){
  const t = state.transactions.find(x=>x.id===id && !x.deleted);
  if(!t) return;
  state.editingTxId = id;
  state.formType = t.type;
  state.formAmount = t.amount;
  state.formCategory = t.category;
  state.formPerson = t.person;
  state.formPayment = t.paymentMethod || null;
  state.formDate = t.date;
  state.formMemo = t.memo || '';
  state.tab = 'add';
  state.addStep = 'detail';
  render();
}

/* ---------- drag reorder (touch + mouse via Pointer Events) ---------- */
function commitOrder(kind, orderedKeys){
  if(kind==='payment'){
    state.paymentMethods = orderedKeys.map(k=>state.paymentMethods.find(p=>p.id===k)).filter(Boolean);
    persistPayments();
  } else {
    const arr = kind==='expense' ? state.expenseCats : state.incomeCats;
    const reordered = orderedKeys.map(k=>arr.find(c=>c.n===k)).filter(Boolean);
    if(kind==='expense'){ state.expenseCats = reordered; persistExpCats(); }
    else { state.incomeCats = reordered; persistIncCats(); }
  }
}
function setupDragHandle(handle){
  const kind = handle.dataset.draghandle;
  const row = handle.closest('.catrow');
  const container = row.parentElement;

  handle.addEventListener('pointerdown', (e)=>{
    e.preventDefault();
    const rows = Array.from(container.children);
    let orderKeys = rows.map(r=>r.dataset.key);
    const startIndex = orderKeys.indexOf(row.dataset.key);
    let curIndex = startIndex;
    const rowHeight = row.getBoundingClientRect().height;
    const startY = e.clientY;

    row.classList.add('dragging');
    row.style.zIndex = 50;
    try{ handle.setPointerCapture(e.pointerId); }catch(err){}

    function onMove(ev){
      const D = ev.clientY - startY;
      const shiftedSlots = Math.max(-startIndex, Math.min(orderKeys.length-1-startIndex, Math.round(D / rowHeight)));
      const targetIndex = startIndex + shiftedSlots;
      if(targetIndex !== curIndex){
        const [moved] = orderKeys.splice(curIndex,1);
        orderKeys.splice(targetIndex,0,moved);
        curIndex = targetIndex;
        orderKeys.forEach(k=>{
          const el = container.querySelector(`[data-key="${CSS.escape(k)}"]`);
          if(el) container.appendChild(el);
        });
      }
      row.style.transform = `translateY(${D - shiftedSlots*rowHeight}px)`;
    }
    function onUp(){
      row.classList.remove('dragging');
      row.style.transform = '';
      row.style.zIndex = '';
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      commitOrder(kind, orderKeys);
      render();
    }
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
}

/* ---------- backup / csv ---------- */
function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}
function exportCsv(){
  const rows = [['날짜','유형','카테고리','금액','지불수단','등록자','메모']];
  activeTx().sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    rows.push([t.date, t.type==='income'?'수입':'지출', t.category, t.amount, t.paymentMethod?payName(t.paymentMethod):'', personLabel(t.person), (t.memo||'').replace(/[\r\n,]/g,' ')]);
  });
  const csv = '\uFEFF' + rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  downloadFile('804호가계부_거래내역_'+todayStr()+'.csv', csv, 'text/csv;charset=utf-8;');
}
function exportBackup(){
  const data = {
    version:1, exportedAt: new Date().toISOString(),
    transactions: state.transactions, expenseCats: state.expenseCats, incomeCats: state.incomeCats,
    paymentMethods: state.paymentMethods, personNames: state.personNames,
    savings: state.savings, deposits: state.deposits, loans: state.loans, stocks: state.stocks, accounts: state.accounts, recurring: state.recurring,
    budgets: state.budgets, lastUsedPayment: state.lastUsedPayment,
  };
  downloadFile('804호가계부_백업_'+todayStr()+'.json', JSON.stringify(data, null, 2), 'application/json');
}
function importBackupFromFile(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    let data;
    try{ data = JSON.parse(e.target.result); }
    catch(err){ openModal('confirm', {message:'백업 파일을 읽을 수 없어요. 올바른 백업 파일인지 확인해주세요.', submitLabel:'확인', action:()=>{}}); return; }
    openModal('confirm', {message:'현재 가계부 데이터를 이 백업 파일 내용으로 덮어씁니다. 계속할까요?', submitLabel:'복원하기', action: async ()=>{
      state.transactions = data.transactions||[]; state.expenseCats = data.expenseCats||DEFAULT_EXPENSE.slice();
      state.incomeCats = data.incomeCats||DEFAULT_INCOME.slice(); state.paymentMethods = data.paymentMethods||DEFAULT_PAYMENTS.slice();
      state.personNames = data.personNames||{p1:'남편',p2:'아내'}; state.savings = data.savings||[]; state.deposits = data.deposits||[]; state.loans = data.loans||[];
      state.stocks = data.stocks||[]; state.accounts = data.accounts||[]; state.recurring = data.recurring||[]; state.budgets = data.budgets||{};
      state.lastUsedPayment = data.lastUsedPayment||{};
      await Promise.all([ persist(STORE_TX,state.transactions), persistExpCats(), persistIncCats(), persistPayments(), persistPersons(),
        persist(STORE_SAVINGS,state.savings), persist(STORE_DEPOSITS,state.deposits), persist(STORE_LOANS,state.loans), persist(STORE_STOCKS,state.stocks), persist(STORE_ACCOUNTS,state.accounts), persist(STORE_RECURRING,state.recurring),
        persistBudgets(), persistLastUsedPayment() ]);
      state.tab='home'; render();
    }});
  };
  reader.readAsText(file);
}

  const addRecurring = document.getElementById('addRecurring'); if(addRecurring) addRecurring.onclick = ()=>openModal('addRecurring',{});
  document.querySelectorAll('[data-editrecurring]').forEach(row=>{ row.addEventListener('click', (e)=>{ if(e.target.closest('[data-delrecurring]')) return; openModal('editRecurring',{id:row.dataset.editrecurring}); }); });
  document.querySelectorAll('[data-delrecurring]').forEach(btn=>{ btn.onclick = (e)=>{ e.stopPropagation(); openModal('confirm',{message:'이 고정비용을 삭제할까요?', action:()=>deleteRecurring(btn.dataset.delrecurring)}); }; });

  const exportCsvBtn = document.getElementById('exportCsv'); if(exportCsvBtn) exportCsvBtn.onclick = exportCsv;
  const exportBackupBtn = document.getElementById('exportBackup'); if(exportBackupBtn) exportBackupBtn.onclick = exportBackup;
  const importBackupBtn = document.getElementById('importBackupBtn'); const importBackupFile = document.getElementById('importBackupFile');
  if(importBackupBtn && importBackupFile){ importBackupBtn.onclick = ()=>importBackupFile.click();
    importBackupFile.onchange = (e)=>{ if(e.target.files[0]) importBackupFromFile(e.target.files[0]); e.target.value=''; }; }

  const searchInput = document.getElementById('searchInput'); if(searchInput) searchInput.oninput = (e)=>{ state.searchQuery = e.target.value; render(); };
  const dateInput = document.getElementById('dateInput'); if(dateInput) dateInput.oninput = (e)=>{ state.formDate = e.target.value; };
  const memoInput = document.getElementById('memoInput'); if(memoInput) memoInput.oninput = (e)=>{ state.formMemo = e.target.value; };

  const saveTx = document.getElementById('saveTx');
  if(saveTx) saveTx.onclick = async ()=>{
    if(!state.formAmount || state.formAmount<=0){ return; }
    state.saving = true; render();
    const now = Date.now();
    if(state.editingTxId){
      const existing = state.transactions.find(t=>t.id===state.editingTxId);
      if(existing){
        existing.type = state.formType; existing.amount = state.formAmount; existing.category = state.formCategory;
        existing.paymentMethod = state.formType==='expense' ? state.formPayment : null;
        existing.person = state.formPerson; existing.date = state.formDate || todayStr();
        existing.memo = (state.formMemo||'').trim(); existing.updatedAt = now;
      }
      if(state.formType==='expense' && state.formPayment){ state.lastUsedPayment[state.formPerson] = state.formPayment; persistLastUsedPayment(); }
      await persistTx();
    } else {
      const tx = { id: uid(), type: state.formType, amount: state.formAmount, category: state.formCategory,
        paymentMethod: state.formType==='expense' ? state.formPayment : null,
        person: state.formPerson, date: state.formDate || todayStr(), memo: (state.formMemo||'').trim(),
        createdAt: now, updatedAt: now, deleted:false };
      state.transactions.push(tx);
      if(state.formType==='expense' && state.formPayment){ state.lastUsedPayment[state.formPerson] = state.formPayment; persistLastUsedPayment(); }
      await persistTx();
    }
    state.saving = false; state.formAmount=0; state.formMemo=''; state.formDate=null; state.formCategory=null; state.editingTxId=null;
    state.tab = 'home'; state.addStep='amount';
    render();
  };
  const deleteFromEdit = document.getElementById('deleteFromEdit');
  if(deleteFromEdit) deleteFromEdit.onclick = ()=>openModal('confirm',{message:'이 내역을 삭제할까요?', action:()=>{ deleteTx(state.editingTxId); state.editingTxId=null; state.tab='home'; state.addStep='amount'; render(); }});

  document.querySelectorAll('[data-filter]').forEach(btn=>{ btn.onclick = ()=>{ state.filterPerson = btn.dataset.filter; render(); }; });
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = (e)=>{ e.stopPropagation(); openModal('confirm',{message:'이 내역을 삭제할까요?', action:()=>deleteTx(btn.dataset.del)}); };
  });
  document.querySelectorAll('[data-edittx]').forEach(row=>{
    row.addEventListener('click', (e)=>{ if(e.target.closest('[data-del]')) return; openEditTx(row.dataset.edittx); });
  });

  const modalCancel = document.getElementById('modalCancel'); if(modalCancel) modalCancel.onclick = closeModal;
  const modalSubmit = document.getElementById('modalSubmit'); if(modalSubmit) modalSubmit.onclick = submitModal;
  const modalBackdrop = document.getElementById('modalBackdrop');
  if(modalBackdrop) modalBackdrop.addEventListener('click', (e)=>{ if(e.target===modalBackdrop) closeModal(); });
}

loadAll();
</script>
</body>
</html>
